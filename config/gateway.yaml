version: "2026-07-02.003"
active: true

# 动态入口路径列表：短写形式会自动映射到默认逻辑端点 generate。
# 真正转发到哪个下游源路径，由请求时选中的 provider.endpoint.path 决定。
routes:
  - "/v1/images/generations"
  - "/api/v3/images/generations"

providers:
  # 透传模式：火山接口已是原生格式，零转换
  volc_sd:
    base_url: "${VOLC_SD_BASE_URL}"
    auth: {type: bearer}
    passthrough: true
    resilience: {max_concurrency: 100, failure_threshold: 5, recovery_seconds: 30, retry_attempts: 0}
    endpoint: {method: POST, path: "/v1/images/generations", timeout: 60}

  # 声明式+表达式：官方 Seedance 需要字段映射
  seedance:
    base_url: "${SEEDANCE_BASE_URL}"
    auth: {type: bearer}
    resilience: {max_concurrency: 80, failure_threshold: 5, recovery_seconds: 30, retry_attempts: 0}
    endpoint: {method: POST, path: "/v1/images/generations", timeout: 120}
    request_map:
      model: {const: "seedance-image"}
      "input.prompt": {from: prompt}
      "input.width": {from: width, default: 1024}
      "input.height": {from: height, default: 1024}
      "input.quality":
        from: quality
        default: "standard"
        map: {sd: "standard", hd: "high_quality"}
      "input.seed": {from: seed}
    response_map:
      image_url: {from: output.image_url}
      seed: {from: output.seed}
      created: {from: created_at}

  # 脚本模式：Kling 复杂预处理
  # 注意：Kling 下游接口路径是单数 "/v1/image/generations"（不是 images），
  # 这正好演示了同一个来源路径（如 /v1/image-task/generations）在选中不同
  # provider 时，会被路由到各自不同的下游目标路径。
  kling:
    base_url: "${KLING_BASE_URL}"
    auth: {type: bearer}
    resilience: {max_concurrency: 50, failure_threshold: 5, recovery_seconds: 45, retry_attempts: 0}
    endpoint: {method: POST, path: "/v1/image/generations", timeout: 90}
    request_script: |
      def transform(body):
          ratio = body.get("aspect_ratio", "16:9")
          mapping = {"16:9": (1024,576), "9:16": (576,1024), "1:1": (1024,1024)}
          w, h = mapping.get(ratio, (1024,1024))
          return {
              "prompt": body.get("prompt"),
              "negative_prompt": body.get("negative_prompt"),
              "width": w,
              "height": h,
              "num": body.get("n", 1),
          }
    response_script: |
      def transform(body):
          return {
              "images": [{"url": i["url"], "seed": i.get("seed")} for i in body.get("data", [])],
              "created": body.get("created"),
          }

  # 真实测试
  ark_seedream:
      base_url: "https://ark.cn-beijing.volces.com"
      auth: {type: bearer}
      passthrough: true
      resilience:
        max_concurrency: 50
        failure_threshold: 5
        recovery_seconds: 45
        retry_attempts: 0
      endpoint:
        method: POST
        path: "/api/v3/images/generations"
        timeout: 180
